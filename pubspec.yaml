name: gps_location_tracker_sentinel_tech
description: "Pre Screening Test Developer-Sambudi Sugya Putra"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  bloc: ^9.0.0
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_animate: ^4.1.0
  flutter_bloc: ^9.1.1
  flutter_easyloading: ^3.0.5
  #flutter_local_notifications: ^17.2.1+2
  flutter_foreground_task: ^8.16.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  flutter_svg: ^2.0.5
  fpdart: ^0.6.0
  geolocator: ^14.0.1
  geolocator_android: 5.0.0
  get_it: ^8.0.3
  google_maps_flutter: ^2.5.0
  go_router: ^15.1.2
  intl: ^0.20.2
  lottie: ^3.1.0
  package_info_plus: ^8.1.0
  path: ^1.8.2
  path_provider: ^2.0.12
  permission_handler: ^12.0.0+1
  shared_preferences: ^2.0.17
  shimmer: ^3.0.0
  sqflite: ^2.2.8+4
  sqlite_async: ^0.6.1
  #sqlite3_flutter_libs: ^0.5.24
  wakelock_plus: ^1.2.8
  #workmanager:
  #  git:
  #    url: https://github.com/fluttercommunity/flutter_workmanager.git
  #    path: workmanager
  #    ref: v0.7.0

dev_dependencies:
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.6
  json_serializable: ^6.9.5

flutter:
  assets:
    - assets/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto/Roboto-Thin.ttf
          weight: 100
        - asset: assets/fonts/roboto/Roboto-ThinItalic.ttf
          style: italic
          weight: 100
        - asset: assets/fonts/roboto/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/roboto/Roboto-LightItalic.ttf
          style: italic
          weight: 300
        - asset: assets/fonts/roboto/Roboto-Regular.ttf
        - asset: assets/fonts/roboto/Roboto-Italic.ttf
          style: italic
        - asset: assets/fonts/roboto/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/roboto/Roboto-MediumItalic.ttf
          style: italic
          weight: 500
        - asset: assets/fonts/roboto/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/roboto/Roboto-BoldItalic.ttf
          style: italic
          weight: 700
        - asset: assets/fonts/roboto/Roboto-Black.ttf
          weight: 900
        - asset: assets/fonts/roboto/Roboto-BlackItalic.ttf
          style: italic
          weight: 900
  generate: true
  uses-material-design: true

flutter_gen:
  colors:
    inputs:
      - assets/colors/colors.xml
  integrations:
    flutter_svg: true
  line_length: 80
  assets:
    enabled: true
  output: lib/assets/
