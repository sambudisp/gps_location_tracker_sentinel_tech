name: Flutter CD - Android Debug

on:
  push:
    branches: [ sambudi/github-action ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'

      - name: Setup PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Activate flutter_gen
        run: dart pub global activate flutter_gen

      - name: Generate assets (flutter_gen)
        run: fluttergen -c pubspec.yaml

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: internaltesters
          file: build/app/outputs/flutter-apk/app-debug.apk
          releaseNotes: "Percobaan Debug build from commit ${{ github.sha }}"